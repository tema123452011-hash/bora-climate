# Манифест для PostgreSQL в Kubernetes
# Этот файл создаёт базу данных и делает её доступной внутри кластера

apiVersion: v1
kind: Namespace
metadata:
  name: bora-climate
  # Namespace — это способ изолировать ресурсы
  # Все наши приложения будут в namespace "bora-climate"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: bora-climate
  labels:
    app: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # PersistentVolumeClaim — запрос на хранилище
  # 1Gi = 1 гигабайт
  # Это нужно, чтобы данные не пропали при перезапуске пода

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: bora-climate
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
              name: postgres
          env:
            # Переменные окружения для PostgreSQL
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "bora_climate"
            - name: POSTGRES_USER
              value: "postgres"
          volumeMounts:
            # Подключаем хранилище для сохранения данных
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: bora-climate
spec:
  type: ClusterIP
  # ClusterIP — сервис доступен только внутри кластера
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: postgres
  # Service — это "входная точка" для пода
  # Другие приложения могут подключаться к postgres:5432

Subject: Заявка с сайта BORA Climate

<div style="font-family: system-ui, sans-serif, Arial; font-size: 14px">
<div style="margin-bottom: 20px;">
    <h2 style="color: #0066cc; margin: 0;">Новая заявка с сайта BORA Climate</h2>
</div>

<div style="padding: 15px; background-color: #f5f7fa; border-radius: 8px;">
    <table role="presentation" style="width: 100%;">
    <tr>
        <td style="padding: 10px 0; border-bottom: 1px solid #e0e0e0;">
            <strong style="color: #666;">Имя:</strong>
        </td>
        <td style="padding: 10px 0; border-bottom: 1px solid #e0e0e0;">
            {{name}}
        </td>
    </tr>
    <tr>
        <td style="padding: 10px 0; border-bottom: 1px solid #e0e0e0;">
            <strong style="color: #666;">Телефон:</strong>
        </td>
        <td style="padding: 10px 0; border-bottom: 1px solid #e0e0e0;">
            {{phone}}
        </td>
    </tr>
    <tr>
        <td style="padding: 10px 0; border-bottom: 1px solid #e0e0e0;">
            <strong style="color: #666;">Email:</strong>
        </td>
        <td style="padding: 10px 0; border-bottom: 1px solid #e0e0e0;">
            {{email}}
        </td>
    </tr>
    <tr>
        <td style="padding: 10px 0; vertical-align: top;">
            <strong style="color: #666;">Сообщение:</strong>
        </td>
        <td style="padding: 10px 0;">
            {{message}}
        </td>
    </tr>
    </table>
</div>

<div style="margin-top: 20px; color: #999; font-size: 12px;">
    Отправлено с сайта BORA Climate
</div>
</div>

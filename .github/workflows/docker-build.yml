# CI/CD Pipeline для BORA Climate
# Автоматическая сборка Docker-образа при push в master

name: Build and Push Docker Image

# Запуск при push в ветку master
on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Шаг 1: Получаем код из репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # Шаг 2: Авторизация в Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Шаг 3: Собираем Docker-образ
      - name: Build Docker image
        run: docker build -t tema201111/bora-climate:latest .

      # Шаг 4: Загружаем образ в Docker Hub
      - name: Push Docker image
        run: docker push tema201111/bora-climate:latest

      # Шаг 5: Выводим информацию
      - name: Success message
        run: |
          echo "✅ Docker-образ успешно собран и загружен!"
          echo "📦 Образ: tema201111/bora-climate:latest"
          echo "🔗 Docker Hub: https://hub.docker.com/r/tema201111/bora-climate"

# ============================================
# Docker Compose для BORA Climate
# Flask подключается к существующему postgres_bora
# ============================================
# Запуск: docker-compose up --build
# ============================================

services:
  # Flask-приложение (бэкенд)
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      # Подключение к postgres_bora (уже запущен)
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:5432/bora_climate
      - SECRET_KEY=dev-secret-key-change-in-production
    # Разрешаем подключение к хосту (для Windows)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

